<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакты — Правовое агентство «БиС»</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>
    <div id="header"></div>

    <!-- Page Hero -->
    <section class="page-hero">
        <div class="container">
            <h1 class="page-hero__title">Контакты</h1>
        </div>
    </section>

    <!-- Contacts Section -->
    <section class="contacts">
        <div class="container">
            <div class="contacts__content">
                <div class="contacts__info">
                    <h2 class="section__title">Свяжитесь с нами</h2>
                    <p class="contacts__text">Мы готовы ответить на ваши вопросы и обсудить вашу ситуацию. Выберите удобный способ связи.</p>
                    
                    <div class="contacts__list">
                        <div class="contact__item">
                            <h3 class="contact__title">Телефон</h3>
                            <a href="tel:+79062387060" class="contact__value">+79062387060</a>
                        </div>
                        <div class="contact__item">
                            <h3 class="contact__title">Email</h3>
                            <a href="mailto:infobislaw@mail.ru" class="contact__value">infobislaw@mail.ru</a>
                        </div>
                        <div class="contact__item">
                            <h3 class="contact__title">Адрес</h3>
                            <p class="contact__value">г. Калининград, ул. 9 Апреля, д. 52</p>
                        </div>
                        <div class="contact__item">
                            <h3 class="contact__title">Режим работы</h3>
                            <p class="contact__value">Пн-Пт: 9:00 - 18:00<br>Сб-Вс: Выходной</p>
                        </div>
                    </div>
                </div>

                <div class="contacts__form-wrapper">
                    <form class="contact-form" id="contactForm">
                        <h3 class="contact-form__title">Записаться на консультацию</h3>
                        <div class="form-group">
                            <label for="name" class="form-label">Имя *</label>
                            <input type="text" id="name" name="name" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label for="phone" class="form-label">Телефон *</label>
                            <input type="tel" id="phone" name="phone" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" id="email" name="email" class="form-input">
                        </div>
                        <div class="form-group">
                            <label for="message" class="form-label">Сообщение</label>
                            <textarea id="message" name="message" class="form-textarea" rows="5"></textarea>
                        </div>
                        <button type="submit" class="btn btn--primary btn--block">Отправить заявку</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <div id="footer"></div>

    <script src="js/main.js"></script>
    <script src="js/email-handler.js"></script>
</body>
</html>
